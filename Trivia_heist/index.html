<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Heist Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Impact', 'Haettenschweiler', 'Arial Narrow Bold', 'sans-serif'],
            },
            animation: {
              'float-slow': 'float 6s ease-in-out infinite',
              'float-medium': 'float 4s ease-in-out infinite',
              'slide-up': 'slideUp 0.5s ease-out forwards',
              'fade-in': 'fadeIn 0.8s ease-out forwards',
              'shake': 'shake 0.4s ease-in-out',
              'pulse-urgent': 'pulseUrgent 1s infinite',
              'pop-in': 'popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
                '50%': { transform: 'translateY(-20px) rotate(5deg)' },
              },
              slideUp: {
                '0%': { transform: 'translateY(20px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              shake: {
                '0%, 100%': { transform: 'translateX(0)' },
                '20%': { transform: 'translateX(-4px)' },
                '40%': { transform: 'translateX(4px)' },
                '60%': { transform: 'translateX(-2px)' },
                '80%': { transform: 'translateX(2px)' },
              },
              pulseUrgent: {
                '0%, 100%': { opacity: '1', boxShadow: '0 0 10px red' },
                '50%': { opacity: '0.8', boxShadow: '0 0 25px red' },
              },
              popIn: {
                '0%': { transform: 'scale(0.5)', opacity: '0', filter: 'blur(4px)' },
                '100%': { transform: 'scale(1)', opacity: '1', filter: 'blur(0)' },
              }
            }
          },
        },
      }
    </script>
    <!-- Importing Inter for body and generic sans for display fallbacks -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
      body {
        background-color: #000;
        font-family: 'Inter', sans-serif;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.05);
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(220, 38, 38, 0.5);
        border-radius: 3px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(220, 38, 38, 0.8);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",

  }
}
</script>
